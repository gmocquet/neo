repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
        # Run only at the pre-commit stage
        stages: [pre-commit]
      - id: trailing-whitespace

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-crlf
      - id: remove-crlf

  # actionlint lints GitHub Actions workflow files (.github/workflows/*.yml),
  # flagging expression/syntax errors and shell issues inside `run:` steps.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Validate the repo-settings config against its JSON Schema.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-jsonschema
        name: Validate repo settings
        files: ^\.github/repo-settings/repo-settings\.json$
        args: ["--schemafile", ".github/repo-settings/repo-settings.schema.json"]
